<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BONT HUB - Prețuri</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #0A020F;
      --card: #140A22;
      --accent: #AA50FF;
      --accent2: #D23CFF;
      --text: #F5F5FF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family: 'Gotham Black', Arial, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
    }

    .navbar {
      background: rgba(20,10,34,0.98);
      position: fixed;
      width: 100%;
      z-index: 1000;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(90deg, #AA50FF, #E0B8FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hamburger { font-size: 28px; cursor: pointer; color: #AA50FF; }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 65px;
      left: 0;
      width: 100%;
      background: #140A22;
      flex-direction: column;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    .section { padding: 110px 5% 80px; }

    h2 {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 60px;
      background: linear-gradient(90deg, #AA50FF, #E0B8FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .price-grid {
      display: flex;
      flex-direction: column;
      gap: 25px;
      max-width: 520px;
      margin: 0 auto;
    }

    .price-card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid rgba(170,80,255,0.2);
      transition: all 0.4s ease;
    }
    .price-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 0 40px rgba(170,80,255,0.4);
    }

    .color-dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .price-info h3 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }
    .price-info p {
      font-size: 1.1rem;
      color: #C8A0FF;
    }
    .price-amount {
      margin-left: auto;
      text-align: right;
    }
    .price-amount .lei {
      font-size: 2rem;
      font-weight: bold;
      color: #E0B8FF;
    }
    .price-amount .euro {
      font-size: 1.1rem;
      color: #8866AA;
    }

    .discord-btn {
      padding: 18px 50px;
      font-size: 1.35rem;
      font-weight: bold;
      background: linear-gradient(90deg, #AA50FF, #D23CFF);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(170,80,255,0.8);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: pulseGlow 2s infinite;
      transition: all 0.3s ease;
      width: 100%;
      justify-content: center;
      margin-top: 40px;
    }
    .discord-btn:hover {
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 0 70px rgba(210,60,255,0.9);
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(170,80,255,0.8); }
      50% { box-shadow: 0 0 70px rgba(210,60,255,1); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">BONT HUB</div>
    <i class="fas fa-bars hamburger" onclick="toggleMenu()"></i>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Acasă</a>
    <a href="features.html">Funcții</a>
    <a href="pricing.html">Prețuri</a>
    <a href="https://discord.gg/k3RpJRTada" target="_blank">Discord</a>
  </div>

  <section class="section">
    <h2>💰 PREȚURI</h2>

    <div class="price-grid">
      <!-- 1 Zi -->
      <div class="price-card">
        <div class="color-dot" style="background:#22C55E;">1</div>
        <div class="price-info">
          <h3>1 ZI / A DAY</h3>
          <p>Acces complet 24 ore</p>
        </div>
        <div class="price-amount">
          <div class="lei">15 LEI</div>
          <div class="euro">3 EURO</div>
        </div>
      </div>

      <!-- 1 Săptămână -->
      <div class="price-card">
        <div class="color-dot" style="background:#3B82F6;">7</div>
        <div class="price-info">
          <h3>1 SĂPTĂMÂNĂ / A WEEK</h3>
          <p>Acces complet 7 zile</p>
        </div>
        <div class="price-amount">
          <div class="lei">25 LEI</div>
          <div class="euro">5 EURO</div>
        </div>
      </div>

      <!-- 1 Lună -->
      <div class="price-card">
        <div class="color-dot" style="background:#A855F7;">30</div>
        <div class="price-info">
          <h3>1 LUNĂ / A MONTH</h3>
          <p>Acces complet 30 zile</p>
        </div>
        <div class="price-amount">
          <div class="lei">45 LEI</div>
          <div class="euro">9 EURO</div>
        </div>
      </div>

      <!-- Permanent -->
      <div class="price-card">
        <div class="color-dot" style="background:#EAB308;">∞</div>
        <div class="price-info">
          <h3>PERMANENT</h3>
          <p>Acces pe viață</p>
        </div>
        <div class="price-amount">
          <div class="lei">55 LEI</div>
          <div class="euro">11 EURO</div>
        </div>
      </div>
    </div>

    <a href="https://discord.gg/k3RpJRTada" target="_blank" class="discord-btn">
      <i class="fab fa-discord"></i> Cumpără de pe Discord
    </a>
  </section>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
    }
  </script>
</body>
</html>
